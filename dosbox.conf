# MS-DOS Legacy Collection — DOSBox Configuration
# One-click launch: dosbox -conf dosbox.conf
#
# Optimized for running MS-DOS 6.22, Turbo C/C++,
# assembly tools, and classic DOS software.

[sdl]
fullscreen=false
fullresolution=1024x768
windowresolution=1024x768
output=opengl
autolock=true
sensitivity=100
waitonerror=true

[dosbox]
machine=svga_s3
memsize=16
realticks=true

[cpu]
core=auto
cputype=auto
cycles=auto
cycleup=500
cycledown=100

[render]
frameskip=0
aspect=true
scaling=auto

[mixer]
rate=44100
blocksize=2048
prebuffer=10

[midi]
mpu401=intelligent

[sblaster]
sbtype=sb16
sbbase=220
irq=7
dma=1
hdma=5
mixer=true
oplmode=auto

[speaker]
pcspeaker=true

[joystick]
joysticktype=auto

[serial]
serial1=dummy
serial2=dummy
serial3=disabled
serial4=disabled

[dos]
xms=true
ems=true
umb=true
keyboardlayout=auto

[autoexec]
# Mount the repository root as drive C:
mount C .
C:

# Mount boot disk images as A: (optional — uncomment to use)
# imgmount a boot-disk\ms-dos-622.img -t floppy

# Set PATH to include all tool directories
set PATH=C:\;C:\TOOLS;C:\ASSEMBLY;C:\BOOT-DISK

# Display welcome screen
@echo off
cls
echo.
echo ============================================
echo       MS-DOS Legacy Collection
echo       Preserving computing history
echo ============================================
echo.
echo   Quick commands:
echo     C:\            - Repository root (current directory)
echo     TC             - Start Turbo C 2.01
echo     TCC            - Start Turbo C++ 3.0
echo     MASM, LINK     - Assembly development tools
echo     DEBUG          - DOS debugger
echo     tools\         - Utilities (ARJ, PKZIP, PC Tools...)
echo     boot-disk\     - Boot disk images
echo     games\         - Classic DOS games
echo     docs\          - Documentation (coming soon!)
echo.
echo   To quit DOSBox:  EXIT
echo.
echo ============================================
echo.
