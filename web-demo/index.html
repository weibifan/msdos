<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Tutor IV</title>
    <style>
        body { background:#0d1117; color:#c9d1d9; font-family:system-ui; text-align:center; padding:20px; }
        #app { width:720px; aspect-ratio:16/10; margin:0 auto; background:#000; border-radius:8px; overflow:hidden; position:relative; }
        kbd { background:#21262d; border:1px solid #30363d; border-radius:3px; padding:1px 6px; }

        /* Force canvas to fill entire container */
        #app canvas {
            position: absolute !important;
            top: 0 !important; left: 0 !important;
            width: 100% !important; height: 100% !important;
            object-fit: contain !important;
        }
    </style>
</head>
<body>
    <h1>⌨️ Typing Tutor IV</h1>
    <p>经典 DOS 打字练习 &nbsp;|&nbsp; <a href="https://github.com/weibifan/msdos" style="color:#58a6ff">MS-DOS Legacy Collection</a></p>
    <div id="app"></div>
    <p id="msg" style="color:#8b949e;margin-top:12px">🟢 点击 ▶ 按钮启动 DOSBox，然后输入 <kbd>tt</kbd> 回车</p>
    <p style="color:#8b949e;font-size:0.85rem">
        在 <kbd>C:\&gt;</kbd> 输入 <kbd>tt</kbd> 回车启动 &nbsp;|&nbsp;
        <a href="https://js-dos.com" style="color:#58a6ff">js-dos v8</a>
    </p>

    <script src="https://cdn.jsdelivr.net/npm/js-dos@8.4.1/dist/js-dos.js"></script>
    <script>
    var el = document.getElementById('app');
    var msg = document.getElementById('msg');

    Dos(el, {
        url: 'tt-bundle.zip',
        wdosboxUrl: 'https://cdn.jsdelivr.net/npm/js-dos@8.4.1/dist/emulators/wdosbox.js',
        noCloud: true,
        onEvent: function(e, ci) {
            if (e === 'emulator-ready') msg.textContent = '🟢 点击 ▶ 按钮启动 DOSBox';
            if (e === 'running') msg.textContent = '🟢 运行中 — 输入 tt 回车';
            if (e === 'emulator-error') msg.textContent = '🔴 ' + (ci?.message || 'error');
        }
    }).catch(function(err) {
        msg.textContent = '🔴 ' + err.message;
    });
    </script>
</body>
</html>
