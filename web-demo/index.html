<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Tutor IV — Online DOS Demo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/js-dos@8.4.1/dist/js-dos.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 30px 15px;
        }
        .container { max-width: 720px; width: 100%; text-align: center; }
        h1 { font-size: 1.6rem; font-weight: 600; margin-bottom: 4px; }
        .subtitle { color: #8b949e; font-size: 0.9rem; margin-bottom: 20px; }
        .subtitle a { color: #58a6ff; text-decoration: none; }
        #dos-container {
            width: 100%;
            aspect-ratio: 4 / 3;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.6);
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            font-size: 0.82rem;
            color: #8b949e;
        }
        #status { color: #58a6ff; }
        .badge {
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 3px 10px;
            font-size: 0.78rem;
        }
        .instructions {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 16px 20px;
            margin-top: 18px;
            text-align: left;
            font-size: 0.84rem;
            line-height: 1.6;
        }
        .instructions kbd {
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 4px;
            padding: 1px 6px;
            font-family: monospace;
        }
        .footer { margin-top: 20px; font-size: 0.78rem; color: #484f58; }
        .footer a { color: #58a6ff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⌨️ Typing Tutor IV</h1>
        <p class="subtitle">
            A classic DOS typing tutor — part of the
            <a href="https://github.com/weibifan/msdos" target="_blank">MS-DOS Legacy Collection</a>
        </p>
        <div id="dos-container"></div>
        <div class="status-bar">
            <span id="status">Loading DOSBox…</span>
            <span class="badge">MS-DOS</span>
        </div>
        <div class="instructions" id="instructions-box">
            <strong>⏳</strong> 初始化中……
        </div>
        <div class="footer">
            Powered by <a href="https://js-dos.com" target="_blank">js-dos</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/js-dos@8.4.1/dist/js-dos.js"></script>
    <script>
        const container = document.getElementById('dos-container');
        const statusEl = document.getElementById('status');
        const instrEl = document.getElementById('instructions-box');

        function setStatus(msg) { statusEl.textContent = msg; }
        function setInstr(html) { instrEl.innerHTML = html; }

        async function start() {
            // Step 1: Fetch all 3 binary files from same directory
            setStatus('Downloading TT files…');
            setInstr('Fetching TT.EXE, TT.HLP, TT.HIS from server…');

            let exe, hlp, his;
            try {
                [exe, hlp, his] = await Promise.all([
                    fetch('TT.EXE').then(r => { if (!r.ok) throw new Error('TT.EXE HTTP ' + r.status); return r.arrayBuffer(); }),
                    fetch('TT.HLP').then(r => { if (!r.ok) throw new Error('TT.HLP HTTP ' + r.status); return r.arrayBuffer(); }),
                    fetch('TT.HIS').then(r => { if (!r.ok) throw new Error('TT.HIS HTTP ' + r.status); return r.arrayBuffer(); }),
                ]);
                setInstr('✅ Files loaded (' + exe.byteLength + ' + ' + hlp.byteLength + ' + ' + his.byteLength + ' bytes)');
            } catch (e) {
                setStatus('⚠️ Download failed');
                setInstr('❌ ' + e.message);
                return;
            }

            // Step 2: Start DOSBox + inject files via initFs
            setStatus('Starting DOSBox…');
            setInstr('Injecting files into virtual C: drive…');

            try {
                // Try WITHOUT initFs first — just boot plain DOS
                Dos(container, {
                    wdosboxUrl: 'https://cdn.jsdelivr.net/npm/js-dos@8.4.1/dist/emulators/wdosbox.js',
                    onEvent: (event, ci) => {
                        if (event === 'emulator-ready') {
                            setStatus('✅ DOSBox ready');
                            setInstr('Bare DOSBox booted successfully');
                        } else if (event === 'ci-ready') {
                            setStatus('Ready');
                        } else if (event === 'emulator-error') {
                            setStatus('⚠️ Error');
                            setInstr('❌ ' + (ci?.message || 'unknown error'));
                        }
                    },
                });
            } catch (e) {
                setStatus('⚠️ ' + e.message);
                setInstr('❌ ' + e.message);
            }
        }

        start();
    </script>
</body>
</html>
